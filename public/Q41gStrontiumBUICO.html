<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Rating App</title>
    <style>

        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-color: black; 
            object-fit: cover; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .nav {
            margin-bottom: 10px;
            z-index: 10;
        }

        .nav a {
            text-decoration: none;
            color: #4a3461;
            background: rgba(220, 200, 255, 0.9);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .container {
            background-color: rgba(243, 235, 255, 0.85);
            padding: 20px 45px;
            border-radius: 15px;
            box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.5);
            width: 450px;
            border: 1px solid #dcd0ff;
            box-sizing: border-box;
            z-index: 5;
        }

        h2 { 
            text-align: center; 
            color: #333; 
            font-size: 24px;
            margin: 10px 0 20px 0;
        }

        label { 
            font-weight: bold; 
            display: block; 
            margin-top: 15px; 
            color: #333; 
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .stars-input { 
            margin: 15px 0; 
            font-size: 28px; 
            text-align: left; 
        }

        .star { cursor: pointer; color: #ffffff; transition: 0.1s; }
        .star.selected { color: #ffcc00; } 

        button {
            width: 100%;
            background-color: #8147c5; 
            color: white;
            border: none;
            padding: 12px;
            margin-top: 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover { background-color: #0056b3; }

        h3 { text-align: center; color: #333; margin-top: 25px; }

        #movieList { margin-top: 10px; max-height: 250px; overflow-y: auto; }
        
        .movie-item {
            background-color: #fcfaff;
            border: 1px solid #e0d5f5;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 5px;
            font-size: 14px;
            color: #333;
            display: flex;
            justify-content: space-between;
        }
        .yellow-star { color: #ffcc00; }

        .movie-item button {
            width: auto;
            margin-top: 0;
            padding: 5px 10px;
            background-color: #f0f0f0;
            color: #333;
            border: 1px solid #ccc;
            font-size: 12px;
        }

        .movie-item button:hover {
            background-color: #ff4d4d;
            color: white;
        }
    </style>
</head>
<body>

<video autoplay muted loop id="bg-video">
    <source src="oldfilm.mp4" type="video/mp4">
</video>

<div class="nav">
    <a href="Q41gBackdoorsBUICO.html">View LocalStorage Status →</a>
</div>

<div class="container">
    <h2>Add a Movie</h2>
    
    <label>Title:</label>
    <input type="text" id="movieTitle" placeholder="Enter movie title">

    <label>Year:</label>
    <input type="text" id="movieYear" placeholder="e.g. 2025">

    <label>Genre:</label>
    <select id="movieGenre">
        <option value="Action">Action</option>
        <option value="Comedy">Comedy</option>
        <option value="Drama">Drama</option>
        <option value="Horror">Horror</option>
    </select>

    <label>Rating:</label>
    <div class="stars-input" id="starContainer">
        <span class="star" onclick="setRating(1)">★</span>
        <span class="star" onclick="setRating(2)">★</span>
        <span class="star" onclick="setRating(3)">★</span>
        <span class="star" onclick="setRating(4)">★</span>
        <span class="star" onclick="setRating(5)">★</span>
    </div>

    <button onclick="addMovie()">Add Movie</button>

    <h3>Movie List</h3>
    <div id="movieList"></div>
</div>

<script>
    let currentRating = 0;

function setRating(num) {
    currentRating = num;
    let stars = document.querySelectorAll('.star');
    for (let i = 0; i < stars.length; i++) {
        stars[i].classList.toggle('selected', i < num);
    }
}

function addMovie() {
    let title = document.getElementById('movieTitle').value.trim();
    let year = document.getElementById('movieYear').value.trim();
    let genre = document.getElementById('movieGenre').value;

    if (!title || !year || currentRating === 0) {
        alert("Please fill in everything!");
        return;
    }

    let movies = JSON.parse(localStorage.getItem('movies')) || [];
    
    let existingMovieIndex = movies.findIndex(m => m.title.toLowerCase() === title.toLowerCase());

    if (existingMovieIndex !== -1) {
    
        movies[existingMovieIndex].year = year;
        movies[existingMovieIndex].genre = genre;

        let oldRating = parseFloat(movies[existingMovieIndex].rating);
        let newAverage = (oldRating + currentRating) / 2;
        movies[existingMovieIndex].rating = newAverage.toFixed(1); 
        
        alert(`${title} updated! New average rating: ${movies[existingMovieIndex].rating}`);
    } else {
    
        let newMovie = {
            title: title,
            year: year,
            genre: genre,
            rating: currentRating.toString()
        };
        movies.push(newMovie);
    }

    localStorage.setItem('movies', JSON.stringify(movies));
    clearInputs();
    displayMovies();
}

function clearInputs() {
    document.getElementById('movieTitle').value = "";
    document.getElementById('movieYear').value = "";
    setRating(0);
}

function deleteMovie(index) {
    if (confirm("Are you sure you want to delete this movie?")) {
        let movies = JSON.parse(localStorage.getItem('movies')) || [];
        
        movies.splice(index, 1);

        localStorage.setItem('movies', JSON.stringify(movies));
        displayMovies();
    }
}

function displayMovies() {
    let list = document.getElementById('movieList');
    list.innerHTML = "";
    let movies = JSON.parse(localStorage.getItem('movies')) || [];

    movies.forEach((movie, index) => {
        let stars = "";
 
        let displayRating = Math.round(parseFloat(movie.rating));
        
        for(let i=0; i<5; i++) {
            stars += i < displayRating ? '<span class="yellow-star">★</span>' : '<span style="color:#ccc">★</span>';
        }

        list.innerHTML += `
            <div class="movie-item">
                <span>${movie.title} (${movie.year}) - ${movie.genre}, Rating: ${movie.rating} ${stars}</span>
                <button onclick="deleteMovie(${index})" style="width:auto; margin:0; padding:5px 10px; background-color:#ff4d4d; font-size:12px;">Delete</button>
            </div>`;
    });
}

window.onload = displayMovies;
</script>
</body>
</html>
